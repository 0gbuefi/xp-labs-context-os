# Cold Email Domain Expert - Taxonomy
# XP Labs's System-Wide Knowledge Base
# This taxonomy covers ALL cold email expertise across clients

version: "1.0.0"
last_updated: "2026-01-15"
scope: system-wide

# Node classification
node_scope:
  - agency  # This KB is system-wide, not client-specific

domains:
  - campaign-strategy
  - copywriting
  - icp-research
  - metrics-analysis
  - iteration-signals
  - list-building

node_types:
  - concept         # Atomic idea or principle
  - pattern         # Repeatable tactic or approach
  - framework       # Structured methodology
  - case-study      # Real-world example with results
  - diagnostic      # Decision-making criteria

status_values:
  - emergent        # Just discovered, not validated
  - validated       # Proven in 2-3+ scenarios
  - canonical       # Core expertise, referenced 5+ times

# Topic Library - Seed Taxonomy

# Campaign Strategy
campaign_strategy_topics:
  - campaign-ideation
  - offer-design
  - angle-development
  - sequencing-strategy
  - value-prop-articulation
  - positioning-strategy

# Copywriting
copywriting_topics:
  - subject-lines
  - opening-lines
  - value-prop-articulation
  - cta-design
  - personalization-tactics
  - email-structure
  - tone-and-voice
  - storytelling
  - objection-handling

# ICP & Research
icp_research_topics:
  - icp-definition
  - pain-point-research
  - list-building
  - prospect-qualification
  - buyer-persona
  - decision-maker-mapping

# Metrics & Analysis
metrics_analysis_topics:
  - open-rate-signals
  - reply-rate-analysis
  - meeting-conversion
  - negative-reply-patterns
  - bounce-rate-analysis
  - unsubscribe-signals

# Iteration Decisions
iteration_signals_topics:
  - when-to-iterate
  - when-to-ditch
  - campaign-failure-signals
  - campaign-success-indicators
  - copy-optimization
  - angle-pivots
  - icp-refinement

# List Building
list_building_topics:
  - data-sourcing
  - list-hygiene
  - segmentation-strategy
  - enrichment-tactics
  - verification-methods

# Health Thresholds
health_metrics:
  minimum_links_per_node: 3
  tag_sprawl_threshold: 10     # Warn if >10 tags with only 1-2 nodes
  orphan_tag_threshold: 0      # Warn if any tags have 0 nodes
  review_milestone_nodes: 25   # Prompt review every 25 nodes

# Taxonomy Evolution Rules
evolution_guidelines:
  - "Review taxonomy every 25 nodes ingested"
  - "Consolidate tags with <3 nodes after review"
  - "Add new tags only when 3+ nodes would use them"
  - "Remove tags with 0 nodes after 2 consecutive reviews"
  - "Rename ambiguous tags for clarity"
  - "Monthly review recommended for active usage"
