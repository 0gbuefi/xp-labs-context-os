# Market Research Knowledge Base - Taxonomy
# XP Labs's System-Wide Market Research Methodology
# This taxonomy covers ALL market research expertise across clients

version: "1.0.0"
last_updated: "2026-02-19"
scope: system-wide

# Node classification
node_scope:
  - agency  # This KB is system-wide, not client-specific

domains:
  - source-platforms
  - research-process
  - voice-of-customer
  - research-strategy

node_types:
  - concept         # Atomic idea or principle
  - pattern         # Repeatable tactic or approach
  - framework       # Structured methodology
  - case-study      # Real-world example with results
  - diagnostic      # Decision-making criteria

status_values:
  - emergent        # Just discovered, not validated
  - validated       # Proven in 2-3+ scenarios
  - canonical       # Core expertise, referenced 5+ times

# Topic Library - Seed Taxonomy

# Source Platforms
source_platform_topics:
  - reddit-research
  - forum-research
  - amazon-reviews
  - youtube-comments
  - facebook-groups
  - news-sites
  - blog-comments
  - google-search-journey
  - platform-selection
  - anonymity-advantage

# Research Process
research_process_topics:
  - audience-finding
  - data-collection
  - pattern-recognition
  - documentation-methods
  - research-workflow
  - observation-techniques
  - note-taking
  - saturation-detection

# Voice of Customer
voice_of_customer_topics:
  - identity-language
  - pain-language
  - dream-language
  - obstacle-language
  - storytelling-patterns
  - journey-mapping
  - emotional-triggers
  - copy-mining

# Research Strategy
research_strategy_topics:
  - research-scoping
  - stopping-criteria
  - project-value-threshold
  - research-depth
  - platform-prioritization
  - research-sequencing
  - client-survey-integration
  - market-survey-integration

# Health Thresholds
health_metrics:
  minimum_links_per_node: 3
  tag_sprawl_threshold: 10     # Warn if >10 tags with only 1-2 nodes
  orphan_tag_threshold: 0      # Warn if any tags have 0 nodes
  review_milestone_nodes: 25   # Prompt review every 25 nodes

# Taxonomy Evolution Rules
evolution_guidelines:
  - "Review taxonomy every 25 nodes ingested"
  - "Consolidate tags with <3 nodes after review"
  - "Add new tags only when 3+ nodes would use them"
  - "Remove tags with 0 nodes after 2 consecutive reviews"
  - "Rename ambiguous tags for clarity"
  - "Monthly review recommended for active usage"
