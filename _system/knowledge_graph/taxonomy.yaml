# Knowledge Graph Taxonomy - XP Labs
# Companionship for Men in the AI Age — companion-persona operations

version: 2.0.0
last_updated: 2026-04-20

domains:
  blessed:
    - audience          # The men we serve
    - companion         # The personas we build
    - niche             # Blue ocean positioning experiments
    - platform          # Distribution surfaces (IG, X, TT, Snap, Threads, Reddit)
    - monetization      # Revenue mechanics
    - sales-scripts     # DM and chat script patterns
    - tech-stack        # Tools, phones, account ops
    - competitors       # Market landscape
    - methodology       # Chat philosophy, objection handling, parasocial-bond building
    - emergent          # New concepts not yet validated

node_types:
  blessed:
    - concept           # Core ideas
    - pattern           # Repeatable approaches
    - case-study        # Real examples
    - framework         # Structured methodologies
    - persona           # Audience persona OR companion persona (context from domain)
    - segment           # Audience segment
    - niche             # Blue-ocean niche definition
    - script            # DM / chat script
    - playbook          # Platform or operational playbook
    - tool              # Named tech-stack tool
    - competitor        # Competing product

status_values:
  blessed:
    - emergent          # Identified but not validated
    - validated         # Proven in practice (1+ times)
    - canonical         # Proven and referenced (2+ times)

