<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: Letter;
            margin: 0.75in;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            font-size: 11pt;
            max-width: 7.5in;
            margin: 0 auto;
        }

        h1 {
            font-size: 24pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        h2 {
            font-size: 16pt;
            font-weight: 600;
            color: #2c3e50;
            margin-top: 24px;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        h3 {
            font-size: 12pt;
            font-weight: 600;
            color: #34495e;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 12pt;
            color: #555;
            margin-bottom: 24px;
            font-weight: 400;
        }

        .divider {
            border: none;
            border-top: 2px solid #e0e0e0;
            margin: 20px 0;
        }

        p {
            margin-bottom: 12px;
        }

        ul {
            margin: 8px 0 16px 20px;
        }

        li {
            margin-bottom: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 10pt;
        }

        th {
            background-color: #f5f5f5;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #ddd;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        .checklist-item {
            margin-bottom: 16px;
            padding: 12px;
            background-color: #f9f9f9;
            border-left: 4px solid #e74c3c;
            border-radius: 2px;
        }

        .checklist-item.success {
            border-left-color: #27ae60;
        }

        .red-flag {
            color: #e74c3c;
            font-weight: 600;
        }

        .why-it-fails {
            color: #7f8c8d;
            font-style: italic;
        }

        .fix {
            color: #27ae60;
            font-weight: 600;
        }

        .week-section {
            margin-bottom: 20px;
            padding: 14px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }

        .week-title {
            font-size: 13pt;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            font-size: 10pt;
        }

        .cta {
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            text-align: center;
            border-radius: 4px;
            font-weight: 600;
            margin: 16px 0;
        }

        .signature {
            margin-top: 16px;
            font-size: 10pt;
            color: #555;
        }

        strong {
            font-weight: 600;
        }

        .emoji {
            font-size: 14pt;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    {{CONTENT}}
</body>
</html>
